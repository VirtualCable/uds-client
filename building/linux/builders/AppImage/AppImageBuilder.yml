version: 1
AppDir:
  path: /crate/AppDir
  app_info:
    id: org.opencannula.udslauncher
    name: udslauncher
    icon: udslauncher
    version: "{{VERSION}}"
    exec: usr/bin/udslauncher
  apt:
    arch: "{{APT_ARCH}}"
    sources:
      - sourceline: 'deb [arch={{APT_ARCH}}] http://ftp.nl.debian.org/debian/ trixie main contrib non-free'
        key_url: 'https://ftp-master.debian.org/keys/archive-key-13.asc'
    include:
      - libssl3
      - libgl1
      - libglu1-mesa
      - libxft2
      - libxext6
      - libxinerama1
      - libxcursor1
      - libxfixes3
      - libpango-1.0-0
      - libglib2.0-0
      - libgio-2.0-0
      - libcairo2
      - libfreerdp3-3
      - libwinpr3-3
      - libfreerdp-client3-3
      - libxss1
    exclude: []
  after_runtime: |
    set -eu
    usr_bin="${TARGET_APPDIR}/usr/bin"
    # create symlink for xfreerdp
    if [ ! -e "${usr_bin}/xfreerdp" ] && [ -e "${usr_bin}/xfreerdp3" ]; then
      ln -s "xfreerdp3" "${usr_bin}/xfreerdp"
    fi

    # Fix glibc loader paths in compat runtime
    compat="${TARGET_APPDIR}/runtime/compat"
    if [ -d "${compat}" ]; then
      cd "${compat}"
      if [ ! -e "lib64" ] && [ -d "usr/lib64" ]; then
        ln -s "usr/lib64" "lib64"
      fi
      if [ ! -e "lib" ] && [ -d "usr/lib" ]; then
        ln -s "usr/lib" "lib"
      fi
      # For aarch64 / multiarch
      for arch_dir in usr/lib/*-linux-gnu; do
        if [ -d "$arch_dir" ]; then
          arch_name=$(basename "$arch_dir")
          mkdir -p "lib"
          if [ ! -e "lib/$arch_name" ]; then
            ln -s "../$arch_dir" "lib/$arch_name"
          fi
        fi
      done
    fi

  files:
    exclude:
      - usr/share/man
      - usr/share/doc
      - usr/share/info

AppImage:
  arch: "{{APPIMAGE_ARCH}}"
